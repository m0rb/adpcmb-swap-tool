name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
            name: linux-gcc
          - os: ubuntu-latest
            cc: clang
            cxx: clang++
            name: linux-clang
          - os: macos-latest
            cc: clang
            cxx: clang++
            name: macos
          - os: windows-latest
            cc: cl
            cxx: cl
            name: windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: adpcmb-swap-${{ matrix.name }}
          path: |
            build/adpcmb-swap
            build/adpcmb-swap.exe
            build/Release/adpcmb-swap.exe
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [ -f adpcmb-swap ]; then
              chmod +x adpcmb-swap
              tar czf "../../${name}.tar.gz" adpcmb-swap
            elif [ -f adpcmb-swap.exe ]; then
              zip "../../${name}.zip" adpcmb-swap.exe
            elif [ -f Release/adpcmb-swap.exe ]; then
              zip "../../${name}.zip" Release/adpcmb-swap.exe
            fi
            cd ..
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
